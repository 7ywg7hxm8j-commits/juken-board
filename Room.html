<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャット — 受験板</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* チャットページ専用レイアウト */
    body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0; max-width: 100%; }
    .chat-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; max-width: 860px; width: 100%; margin: 0 auto; padding: 0 16px; }
    .room-info-bar { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); background: var(--paper); }
    .room-info-bar .sup { font-size: 0.78rem; color: var(--ink-light); margin-bottom: 2px; }
    .room-info-bar .title { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 1.15rem; color: var(--ink); }
    .room-info-bar .meta { font-size: 0.76rem; color: #aaa; margin-top: 3px; }
    .messages-area { flex: 1; overflow-y: auto; padding: 12px 0 6px; display: flex; flex-direction: column; gap: 4px; }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chat-input-bar { border-top: 1.5px solid var(--border); padding: 12px 0 max(12px, env(safe-area-inset-bottom)); display: flex; gap: 10px; align-items: flex-end; }

    /* メッセージ */
    .msg { display: flex; gap: 10px; padding: 8px 6px; border-radius: 6px; transition: background 0.15s; }
    .msg:hover { background: rgba(0,0,0,0.025); }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: white; flex-shrink: 0; margin-top: 2px; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .msg-nick { font-weight: 700; font-size: 0.87rem; color: var(--ink); }
    .msg-nick.is-me { color: var(--red); }
    .msg-time { font-size: 0.7rem; color: #bbb; }
    .msg-text { font-size: 0.9rem; line-height: 1.65; color: var(--ink); word-break: break-word; }

    /* リアクション */
    .msg-reactions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .reaction-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700;
      border: 1.5px solid var(--border); background: white; cursor: pointer;
      font-family: inherit; color: var(--ink-light);
      transition: all 0.15s; user-select: none;
    }
    .reaction-btn:hover { border-color: var(--red); color: var(--red); }
    .reaction-btn.voted-up   { background: #FFF0EF; border-color: var(--red); color: var(--red); }
    .reaction-btn.voted-down { background: #F0F4FF; border-color: #4A6FA5; color: #4A6FA5; }
    .reaction-btn.disabled   { opacity: 0.5; cursor: default; pointer-events: none; }
    .reaction-count { font-size: 0.8rem; }

    /* ヘッダー戻るボタン */
    .back-btn { background: none; border: none; color: #bbb; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .back-btn:hover { color: white; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="logo" onclick="location.href='index.html'">
        <span class="logo-main">受<span class="logo-accent">験</span>板</span>
        <span class="logo-sub">JUKEN BOARD</span>
      </div>
    </div>
    <div class="header-right">
      <div id="headerNick" style="display:none;align-items:center;gap:10px;">
        <span class="nick-display">投稿中：<span class="nick-name" id="nickDisplay"></span></span>
        <button class="btn-change-nick" onclick="showNickModal()">変更</button>
      </div>
    </div>
  </div>
</header>

<!-- ニックネームモーダル -->
<div class="overlay" id="nickOverlay">
  <div class="modal modal-center">
    <div class="modal-icon">✏️</div>
    <h2>ニックネームを入力</h2>
    <p>登録不要。ニックネームだけで<br>すぐに参加できます。</p>
    <input class="input-field" type="text" id="nickInput" placeholder="例：東大志望のけんた" maxlength="20"
      onkeydown="if(event.key==='Enter') saveNick()">
    <div style="margin-top:4px">
      <button class="btn-primary" style="width:100%" onclick="saveNick()">参加する →</button>
    </div>
  </div>
</div>

<div class="main-container">
  <div class="room-info-bar">
    <div class="sup" id="roomSup"></div>
    <div class="title" id="roomTitle">読み込み中...</div>
    <div class="meta"><span class="dot-live"></span> <span id="msgCount">0</span> 件の投稿</div>
  </div>
  <div class="chat-wrapper">
    <div class="messages-area" id="messagesArea">
      <div class="loading">読み込み中...</div>
    </div>
    <div class="chat-input-bar">
      <textarea class="chat-textarea" id="chatInput"
        placeholder="メッセージを入力... (Shift+Enterで送信)" rows="1"
        onkeydown="if(event.key==='Enter'&&event.shiftKey){event.preventDefault();sendMessage();}"
        oninput="autoResizeTA(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">送信</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc,
  onSnapshot, query, orderBy, serverTimestamp,
  updateDoc, increment, getDoc, setDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB4bxCNuztkNxwNGKBSaVnK7ciZseAuAys",
  authDomain: "juken-board.firebaseapp.com",
  projectId: "juken-board",
  storageBucket: "juken-board.firebasestorage.app",
  messagingSenderId: "886266222276",
  appId: "1:886266222276:web:759a454be0b0f3a3ed5b91"
});
const db = getFirestore(app);

// URLパラメータ解析
// ?type=nyushi&roomId=xxx  or  ?type=mosshi&seriesId=xxx&roomId=xxx
const params  = new URLSearchParams(location.search);
const type    = params.get('type');      // 'nyushi' or 'mosshi'
const roomId  = params.get('roomId');
const seriesId = params.get('seriesId');
const roomName = decodeURIComponent(params.get('roomName')||'');
const supName  = decodeURIComponent(params.get('sup')||'');

// メッセージコレクションパス
function msgCol() {
  if (type === 'mosshi') return collection(db, 'mosshi_series', seriesId, 'rooms', roomId, 'messages');
  return collection(db, 'rooms', roomId, 'messages');
}
function roomDocRef() {
  if (type === 'mosshi') return doc(db, 'mosshi_series', seriesId, 'rooms', roomId);
  return doc(db, 'rooms', roomId);
}

// ===== ニックネーム =====
let nickname = localStorage.getItem('juken_nick') || '';

function applyNick(nick) {
  nickname = nick;
  localStorage.setItem('juken_nick', nick);
  document.getElementById('headerNick').style.display = 'flex';
  document.getElementById('nickDisplay').textContent  = nick;
}

window.showNickModal = () => { document.getElementById('nickOverlay').style.display = 'flex'; };
window.saveNick = () => {
  const val = document.getElementById('nickInput').value.trim();
  if (!val) { alert('ニックネームを入力してください'); return; }
  document.getElementById('nickOverlay').style.display = 'none';
  applyNick(val);
};

if (nickname) {
  document.getElementById('nickInput').value = nickname;
  document.getElementById('nickOverlay').style.display = 'none';
  applyNick(nickname);
}

// ===== ヘッダー =====
document.getElementById('roomTitle').textContent = roomName || '部屋';
document.getElementById('roomSup').textContent   = supName;
document.title = (roomName || '部屋') + ' — 受験板';

// ===== ユーティリティ =====
window.autoResizeTA = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(d) {
  return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) + ' ' + (d.getMonth()+1) + '/' + d.getDate();
}
function nickColor(s) {
  const colors = ['#C0392B','#1A5276','#117A65','#7D3C98','#A04000','#1F618D','#0E6655','#6C3483'];
  let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  return colors[Math.abs(h)%colors.length];
}

// ===== リアクション管理（localStorage）=====
// key: `vote_${roomId}_${msgId}` → 'up' or 'down'
function getVote(msgId) {
  return localStorage.getItem(`vote_${roomId}_${msgId}`);
}
function setVote(msgId, dir) {
  localStorage.setItem(`vote_${roomId}_${msgId}`, dir);
}

// ===== リアクション処理 =====
window.react = async (msgId, dir) => {
  if (!nickname) { showNickModal(); return; }
  const existing = getVote(msgId);
  if (existing) return; // 既に投票済み

  setVote(msgId, dir);

  const msgRef = doc(msgCol(), msgId);
  await updateDoc(msgRef, {
    [`reactions.${dir}`]: increment(1)
  });
};

// ===== メッセージ描画 =====
function renderMsg(m) {
  const isMe = m.nick === nickname;
  const time  = m.createdAt ? fmtTime(m.createdAt.toDate()) : '';
  const up    = m.reactions?.up   || 0;
  const down  = m.reactions?.down || 0;
  const voted = getVote(m.id);
  const upCls   = voted === 'up'   ? 'voted-up'   : (voted ? 'disabled' : '');
  const downCls = voted === 'down' ? 'voted-down'  : (voted ? 'disabled' : '');

  return `<div class="msg" id="msg-${esc(m.id)}">
    <div class="msg-avatar" style="background:${nickColor(m.nick)}">${esc(m.nick.slice(0,1))}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-nick${isMe?' is-me':''}">${esc(m.nick)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${esc(m.text).replace(/\n/g,'<br>')}</div>
      <div class="msg-reactions">
        <button class="reaction-btn ${upCls}" onclick="react('${m.id}','up')">
          👍 <span class="reaction-count">${up}</span>
        </button>
        <button class="reaction-btn ${downCls}" onclick="react('${m.id}','down')">
          👎 <span class="reaction-count">${down}</span>
        </button>
      </div>
    </div>
  </div>`;
}

// ===== リアルタイム購読 =====
const area = document.getElementById('messagesArea');
const q = query(msgCol(), orderBy('createdAt','asc'));

onSnapshot(q, snap => {
  const msgs = [];
  snap.forEach(d => msgs.push({ id: d.id, ...d.data() }));
  const atBot = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  document.getElementById('msgCount').textContent = msgs.length;

  if (!msgs.length) {
    area.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>まだメッセージがありません<br>最初のコメントを投稿しよう！</p></div>`;
    return;
  }
  area.innerHTML = msgs.map(renderMsg).join('');
  if (atBot) area.scrollTop = area.scrollHeight;
});

// ===== 送信 =====
window.sendMessage = async () => {
  if (!nickname) { showNickModal(); return; }
  const input = document.getElementById('chatInput');
  const btn   = document.getElementById('sendBtn');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; window.autoResizeTA(input); btn.disabled = true;
  try {
    await addDoc(msgCol(), { nick: nickname, text, reactions: { up: 0, down: 0 }, createdAt: serverTimestamp() });
    await updateDoc(roomDocRef(), { msgCount: increment(1) });
  } finally { btn.disabled = false; input.focus(); }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受験板 — 受験生のための掲示板・回答共有</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-inner">
    <div class="logo" onclick="switchTab('mosshi')">
      <span class="logo-main">受<span class="logo-accent">験</span>板</span>
      <span class="logo-sub">JUKEN BOARD</span>
    </div>
    <div class="header-right">
      <div id="headerNick" style="display:none;align-items:center;gap:10px;">
        <span class="nick-display">投稿中：<span class="nick-name" id="nickDisplay"></span></span>
        <button class="btn-change-nick" onclick="showNickModal()">変更</button>
      </div>
    </div>
  </div>
</header>

<!-- ===== TABS ===== -->
<nav class="main-tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tab-mosshi" onclick="switchTab('mosshi')">📝 模試</button>
    <button class="tab-btn" id="tab-nyushi" onclick="switchTab('nyushi')">🏫 入試</button>
  </div>
</nav>

<!-- ===== BREADCRUMB ===== -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- ===== NICKNAME MODAL ===== -->
<div class="overlay" id="nickOverlay">
  <div class="modal modal-center">
    <div class="modal-icon">✏️</div>
    <h2>参加する</h2>
    <p>登録不要。ニックネームだけで<br>すぐに参加できます。</p>
    <div class="form-group">
      <label class="form-label">ニックネーム <span style="color:var(--red)">*</span></label>
      <input class="input-field" type="text" id="nickInput"
        placeholder="例：東大志望のけんた" maxlength="20"
        onkeydown="if(event.key==='Enter') saveNick()">
    </div>
    <div class="form-group" style="margin-top:14px;">
      <label class="form-label" style="display:flex;align-items:center;gap:6px;">
        過去最高判定の大学群
        <span style="font-size:0.7rem;color:#aaa;font-weight:400;">任意・回答の重み付けに使用</span>
      </label>
      <select class="input-field" id="levelInput" style="cursor:pointer;">
        <option value="">選択しない</option>
        <option value="toukyouikkou">東京一工</option>
        <option value="kyutei">旧帝大</option>
        <option value="soukei">早慶</option>
        <option value="march">MARCH・関関同立</option>
        <option value="nittokomassen">日東駒専・産近甲龍</option>
        <option value="none">該当なし</option>
      </select>
      <div style="font-size:0.73rem;color:#bbb;margin-top:5px;line-height:1.5;">
        ※自己申告です。未選択でも参加できます。
      </div>
    </div>
    <div style="margin-top:16px">
      <button class="btn-primary" style="width:100%" onclick="saveNick()">参加する →</button>
    </div>
  </div>
</div>

<!-- ===== 入試：部屋作成モーダル ===== -->
<div class="overlay" id="createRoomOverlay" style="display:none">
  <div class="modal">
    <h2>🏫 新しい部屋を作る</h2>
    <div class="form-group">
      <label class="form-label">大学名</label>
      <input class="input-field" type="text" id="newUniv" placeholder="例：東京大学" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">学部・学科</label>
      <input class="input-field" type="text" id="newDept" placeholder="例：理学部物理学科" maxlength="30">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeCreateRoomModal()">キャンセル</button>
      <button class="btn-primary" onclick="submitCreateRoom()">作成する →</button>
    </div>
  </div>
</div>

<!-- ===== 模試：回追加モーダル ===== -->
<div class="overlay" id="addRoomOverlay" style="display:none">
  <div class="modal">
    <h2>📅 回を追加する</h2>
    <div class="form-group">
      <label class="form-label">実施回の名前</label>
      <input class="input-field" type="text" id="newRoomName"
        placeholder="例：2025年6月実施" maxlength="40"
        onkeydown="if(event.key==='Enter') submitAddRoom()">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddRoomModal()">キャンセル</button>
      <button class="btn-primary" onclick="submitAddRoom()">追加する →</button>
    </div>
  </div>
</div>

<!-- ===== 模試：教科追加モーダル ===== -->
<div class="overlay" id="addSubjectOverlay" style="display:none">
  <div class="modal">
    <h2>📚 教科を追加する</h2>
    <div class="form-group">
      <label class="form-label">教科名</label>
      <input class="input-field" type="text" id="newSubjectName"
        placeholder="例：英語・数学IA・国語" maxlength="20"
        onkeydown="if(event.key==='Enter') submitAddSubject()">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddSubjectModal()">キャンセル</button>
      <button class="btn-primary" onclick="submitAddSubject()">追加する →</button>
    </div>
  </div>
</div>



<!-- ===== MAIN ===== -->
<div class="main-container">

  <!-- 模試タブ -->
  <div class="tab-content active" id="content-mosshi">
    <div style="padding:20px 0 16px;">
      <div style="font-size:0.78rem;color:var(--ink-light);letter-spacing:0.08em;margin-bottom:6px;">模試 · 回答共有</div>
      <h1 style="font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:clamp(1.3rem,4vw,1.8rem);color:var(--ink);">模試シリーズを選ぶ</h1>
    </div>
    <div style="height:1px;background:var(--border);margin-bottom:16px;"></div>
    <div id="mosshi-series-grid"></div>
  </div>

  <!-- 入試タブ -->
  <div class="tab-content" id="content-nyushi">
    <div class="nyushi-view active" id="nyushi-view-list">
      <div class="hero">
        <div class="hero-eyebrow">入試 掲示板 · 回答共有</div>
        <h1 class="hero-title">大学・学部ごとの<br><span class="accent">仲間</span>と繋がろう</h1>
        <p class="hero-sub">大学を選んで、学部ごとの部屋でチャットや情報交換ができます。</p>
      </div>
      <div class="search-bar">
        <input class="input-field" type="text" id="nyushi-search" placeholder="大学名で検索..." oninput="renderUnivList(this.value)">
        <button class="btn-secondary" onclick="showCreateRoomModal()">＋ 部屋を作る</button>
      </div>
      <div class="section-label">
        <h2>🏫 大学一覧</h2><div class="line"></div>
        <div class="badge" id="nyushi-univ-count">0大学</div>
      </div>
      <div class="card-grid" id="nyushi-univ-grid"><div class="loading">読み込み中...</div></div>
    </div>

    <div class="nyushi-view" id="nyushi-view-dept">
      <div class="page-header">
        <div class="page-header-title" id="nyushi-dept-univ-title"></div>
        <div class="page-header-sub">学部・学科を選んでください</div>
      </div>
      <div class="section-label">
        <h2>📚 学部・学科一覧</h2><div class="line"></div>
        <div class="badge" id="nyushi-dept-count">0学部</div>
      </div>
      <div class="list-grid" id="nyushi-dept-grid"></div>
      <button class="btn-dashed" onclick="showCreateRoomModalForCurrentUniv()">＋ この大学に学部・学科を追加する</button>
    </div>


  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, doc,
  onSnapshot, query, orderBy, serverTimestamp,
  updateDoc, increment, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ===== FIREBASE =====
const app = initializeApp({
  apiKey: "AIzaSyB4bxCNuztkNxwNGKBSaVnK7ciZseAuAys",
  authDomain: "juken-board.firebaseapp.com",
  projectId: "juken-board",
  storageBucket: "juken-board.firebasestorage.app",
  messagingSenderId: "886266222276",
  appId: "1:886266222276:web:759a454be0b0f3a3ed5b91"
});
const db = getFirestore(app);

// ===== 定数 =====
const EXAM_SERIES = [
  { id: 'zento-kyotsu',           name: '全統共通テスト模試',                     icon: '📘', org: '河合塾' },
  { id: 'zento-kijutsu',          name: '全統記述模試',                           icon: '📘', org: '河合塾' },
  { id: 'zento-pre-kyotsu',       name: '全統プレ共通テスト',                     icon: '📘', org: '河合塾' },
  { id: 'zento-shibokobestu',     name: '志望校別模試',                           icon: '📘', org: '河合塾' },
  { id: 'shinken-kijutsu',        name: '進研模試 総合学力記述模試',               icon: '📗', org: 'ベネッセ' },
  { id: 'shinken-kyotsu',         name: '進研模試 大学入学共通テスト模試',         icon: '📗', org: 'ベネッセ' },
  { id: 'benesse-sundai-kyotsu',  name: 'ベネッセ・駿台 大学入学共通テスト模試',   icon: '📙', org: 'ベネッセ・駿台' },
  { id: 'benesse-sundai-kijutsu', name: 'ベネッセ・駿台記述模試',                 icon: '📙', org: 'ベネッセ・駿台' },
  { id: 'sundai-zenkoku',         name: '駿台全国模試',                           icon: '📕', org: '駿台' },
  { id: 'sundai-atama-kyotsu',    name: '駿台atama＋共通テスト模試',              icon: '📕', org: '駿台' },
  { id: 'sundai-atama-pre',       name: '駿台atama＋プレ共通テスト',              icon: '📕', org: '駿台' },
  { id: 'sundai-shibokobestu',    name: '志望校別模試',                           icon: '📕', org: '駿台' },
  { id: 'toshin-kyotsu',          name: '共通テスト本番レベル模試',                icon: '📓', org: '東進' },
  { id: 'toshin-zenkoku',         name: '全国統一高校生テスト',                   icon: '📓', org: '東進' },
  { id: 'toshin-shibokobestu',    name: '志望校別模試',                           icon: '📓', org: '東進' },
  { id: 'other',                  name: 'その他',                                 icon: '📒', org: 'その他' },
];

const CHOICE_FORMATS = ['1,2,3,4,5', 'a,b,c,d,e', 'ア,イ,ウ,エ,オ', 'A,B,C,D,E'];
const Q_TYPE = {
  choice:  { label: '選択',    color: '#1A5276' },
  extract: { label: '抜き出し', color: '#117A65' },
  essay:   { label: '記述',    color: '#7D3C98' },
};

// ===== 状態 =====
let nickname        = '';
let allRooms        = [];
let currentUniv     = null;
let currentNyushiRoomId = null;
let currentSeries   = null;
let currentMosshiRoom = null;
let currentSubject  = null;
let unsubNyushi     = null;
let unsubMosshi     = null;
let tempSchema      = [];
const pending       = {};

// ===== ユーティリティ =====
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(d) {
  return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) + ' ' + (d.getMonth()+1) + '/' + d.getDate();
}
function nickColor(s) {
  const colors = ['#C0392B','#1A5276','#117A65','#7D3C98','#A04000','#1F618D','#0E6655','#6C3483'];
  let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  return colors[Math.abs(h)%colors.length];
}
function setBreadcrumb(items) {
  const el = document.getElementById('breadcrumb');
  if (!items.length) { el.innerHTML=''; return; }
  el.innerHTML = items.map((item,i) => {
    const sep = i>0 ? '<span class="bc-sep">›</span>' : '';
    if (i===items.length-1) return sep+`<span class="bc-current">${esc(item.label)}</span>`;
    return sep+`<span class="bc-item" onclick="${item.fn}">${esc(item.label)}</span>`;
  }).join('');
}
function renderMsgs(msgs, nick) {
  if (!msgs.length) return `<div class="empty-state"><div class="icon">💬</div><p>まだメッセージがありません</p></div>`;
  return msgs.map(m => {
    const isMe = m.nick===nick;
    const time = m.createdAt ? fmtTime(m.createdAt.toDate()) : '';
    return `<div class="msg">
      <div class="msg-avatar" style="background:${nickColor(m.nick)}">${esc(m.nick.slice(0,1))}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-nick${isMe?' is-me':''}">${esc(m.nick)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-text">${esc(m.text).replace(/\n/g,'<br>')}</div>
      </div></div>`;
  }).join('');
}

// ===== グローバル関数として公開 =====
window.autoResizeTA = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };

// ===== ニックネーム =====
function applyNick(nick) {
  nickname = nick;
  localStorage.setItem('juken_nick', nick);
  document.getElementById('headerNick').style.display = 'flex';
  document.getElementById('nickDisplay').textContent  = nick;
}

window.showNickModal = () => { document.getElementById('nickOverlay').style.display='flex'; };

window.saveNick = () => {
  const val = document.getElementById('nickInput').value.trim();
  if (!val) { alert('ニックネームを入力してください'); return; }
  const level = document.getElementById('levelInput').value;
  localStorage.setItem('juken_level', level);
  document.getElementById('nickOverlay').style.display = 'none';
  applyNick(val);
};

const saved = localStorage.getItem('juken_nick');
if (saved) {
  document.getElementById('nickInput').value = saved;
  const savedLevel = localStorage.getItem('juken_level') || '';
  document.getElementById('levelInput').value = savedLevel;
  document.getElementById('nickOverlay').style.display = 'none';
  applyNick(saved);
}

// ===== タブ切り替え =====
window.switchTab = tab => {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('content-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  setBreadcrumb([]);
  if (tab==='nyushi') resetNyushi();
  if (tab==='mosshi') renderSeriesList();
};

function showMosshiView(id) {
  document.querySelectorAll('.mosshi-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function showNyushiView(id) {
  document.querySelectorAll('.nyushi-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// =============================================
//  模試機能（アコーディオン）
// =============================================
// activeSeriesId: 開いている模試ID
// activeRoomId: 開いている実施回ID
let activeSeriesId = null;
let activeRoomId   = null;

function renderSeriesList() {
  setBreadcrumb([]);
  activeSeriesId = null;
  activeRoomId   = null;
  currentSeries  = null;
  currentMosshiRoom = null;

  const el = document.getElementById('mosshi-series-grid');
  if (!el) return;

  const groups = {};
  EXAM_SERIES.forEach(s => { if(!groups[s.org]) groups[s.org]=[]; groups[s.org].push(s); });

  let html = '';
  Object.entries(groups).forEach(([org, series]) => {
    html += `<div style="margin-bottom:24px;">
      <div style="font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;font-size:0.85rem;
        color:var(--ink-light);letter-spacing:0.05em;margin-bottom:8px;padding-bottom:5px;
        border-bottom:1px solid var(--border);">${esc(org)}</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${series.map(s=>`
          <div>
            <div class="list-card" id="series-btn-${s.id}"
              onclick="toggleSeries('${s.id}','${esc(s.name)}')"
              style="transition:background 0.15s;">
              <div><div class="list-card-title">${s.icon} ${esc(s.name)}</div></div>
              <div class="list-card-chevron" id="series-chev-${s.id}">›</div>
            </div>
            <div id="series-panel-${s.id}" style="display:none;"></div>
          </div>`).join('')}
      </div></div>`;
  });
  el.innerHTML = html;
}

window.toggleSeries = async (seriesId, seriesName) => {
  // 別の模試が開いていたら閉じる（パネルとroomパネルもリセット）
  if (activeSeriesId && activeSeriesId !== seriesId) {
    const oldPanel = document.getElementById('series-panel-'+activeSeriesId);
    if (oldPanel) oldPanel.style.display = 'none';
    const oldChev  = document.getElementById('series-chev-'+activeSeriesId);
    if (oldChev)  oldChev.textContent = '›';
    const oldBtn   = document.getElementById('series-btn-'+activeSeriesId);
    if (oldBtn)   oldBtn.style.background = '';
    // 教科パネルもリセット
    if (activeRoomId) {
      const rp = document.getElementById('room-panel-'+activeRoomId);
      if (rp) rp.style.display = 'none';
    }
    activeRoomId = null;
    currentMosshiRoom = null;
  }

  const panel = document.getElementById('series-panel-'+seriesId);
  const chev  = document.getElementById('series-chev-'+seriesId);
  const btn   = document.getElementById('series-btn-'+seriesId);
  if (!panel) return;

  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    // 閉じる
    panel.style.display = 'none';
    chev.textContent = '›';
    btn.style.background = '';
    activeSeriesId = null;
    currentSeries  = null;
    activeRoomId   = null;
    currentMosshiRoom = null;
  } else {
    // 開く
    activeSeriesId = seriesId;
    currentSeries  = { id: seriesId, name: seriesName };
    panel.style.display = 'block';
    chev.textContent = '∨';
    btn.style.background = 'var(--paper)';
    panel.innerHTML = '<div style="padding:10px 0 4px;font-size:0.83rem;color:#bbb;text-align:center;">読み込み中...</div>';
    await loadRoomsIntoPanel(seriesId, panel);
  }
};

async function loadRoomsIntoPanel(seriesId, panel) {
  const snap = await getDocs(collection(db,'mosshi_series',seriesId,'rooms'));
  const rooms = [];
  snap.forEach(d=>rooms.push({id:d.id,...d.data()}));
  // 最終更新順（updatedAt があれば優先、なければ createdAt）
  rooms.sort((a,b)=>{
    const ta = (a.updatedAt||a.createdAt)?.seconds||0;
    const tb = (b.updatedAt||b.createdAt)?.seconds||0;
    return tb-ta;
  });

  if (!rooms.length) {
    panel.innerHTML = `<div style="padding:10px 0 12px 12px;">
      <div style="font-size:0.83rem;color:#bbb;margin-bottom:8px;">まだ実施回がありません</div>
      <button class="btn-dashed" onclick="showAddRoomModal()">＋ 回を追加する</button>
    </div>`;
    return;
  }

  let html = `<div style="padding:6px 0 6px 12px;border-left:2px solid var(--border);margin:4px 0 4px 8px;">`;
  rooms.forEach(r => {
    html += `<div>
      <div class="list-card" id="room-btn-${r.id}"
        onclick="toggleRoom('${r.id}','${esc(r.name)}','${seriesId}')"
        style="font-size:0.88rem;padding:10px 12px;transition:background 0.15s;">
        <div>
          <div style="font-weight:700;">${esc(r.name)}</div>
          <div style="font-size:0.75rem;color:#aaa;">💬 ${r.msgCount||0}件 · 📝 ${r.subjectCount||0}教科</div>
        </div>
        <div id="room-chev-${r.id}" style="color:#bbb;font-size:1rem;">›</div>
      </div>
      <div id="room-panel-${r.id}" style="display:none;"></div>
    </div>`;
  });
  html += `<button class="btn-dashed" style="margin:8px 0 4px" onclick="showAddRoomModal()">＋ 回を追加する</button>`;
  html += `</div>`;
  panel.innerHTML = html;
}

window.toggleRoom = async (roomId, roomName, seriesId) => {
  // 別の実施回が開いていたら閉じる
  if (activeRoomId && activeRoomId !== roomId) {
    const oldP = document.getElementById('room-panel-'+activeRoomId);
    if (oldP) oldP.style.display = 'none';
    const oldC = document.getElementById('room-chev-'+activeRoomId);
    if (oldC) oldC.textContent = '›';
    const oldB = document.getElementById('room-btn-'+activeRoomId);
    if (oldB) oldB.style.background = '';
  }

  const panel = document.getElementById('room-panel-'+roomId);
  const chev  = document.getElementById('room-chev-'+roomId);
  const btn   = document.getElementById('room-btn-'+roomId);
  if (!panel) return;

  const isOpen = panel.style.display !== 'none';
  if (isOpen) {
    panel.style.display = 'none';
    chev.textContent = '›';
    btn.style.background = '';
    activeRoomId = null;
    currentMosshiRoom = null;
  } else {
    activeRoomId = roomId;
    currentMosshiRoom = { id: roomId, name: roomName, seriesId };
    panel.style.display = 'block';
    chev.textContent = '∨';
    btn.style.background = 'var(--paper)';
    panel.innerHTML = '<div style="padding:8px 0 4px 12px;font-size:0.83rem;color:#bbb;">読み込み中...</div>';
    await loadSubjectsIntoPanel(roomId, seriesId, panel, roomName);
  }
};

async function loadSubjectsIntoPanel(roomId, seriesId, panel, roomName) {
  const snap = await getDocs(collection(db,'mosshi_series',seriesId,'rooms',roomId,'subjects'));
  const subjects = [];
  snap.forEach(d=>subjects.push({id:d.id,...d.data()}));
  // 最終更新順
  subjects.sort((a,b)=>{
    const ta = (a.updatedAt||a.createdAt)?.seconds||0;
    const tb = (b.updatedAt||b.createdAt)?.seconds||0;
    return tb-ta;
  });

  let html = `<div style="padding:6px 0 6px 24px;border-left:2px solid #e8e0d0;margin:4px 0 4px 8px;">`;

  if (!subjects.length) {
    html += `<div style="font-size:0.82rem;color:#bbb;margin-bottom:8px;">まだ教科がありません</div>`;
  } else {
    subjects.forEach(s => {
      const url = `subject.html?seriesId=${encodeURIComponent(seriesId)}&roomId=${encodeURIComponent(roomId)}&subjectId=${encodeURIComponent(s.id)}&subjectName=${encodeURIComponent(s.name)}&sup=${encodeURIComponent(roomName)}`;
      html += `<div class="list-card" onclick="location.href='${url}'"
        style="font-size:0.86rem;padding:9px 12px;margin-bottom:4px;">
        <div>
          <div style="font-weight:700;">${esc(s.name)}</div>
          <div style="font-size:0.74rem;color:#aaa;">回答 ${s.answerCount||0}件</div>
        </div>
        <div style="color:#bbb;">›</div>
      </div>`;
    });
  }

  // チャットリンク
  const chatUrl = `room.html?type=mosshi&seriesId=${encodeURIComponent(seriesId)}&roomId=${encodeURIComponent(roomId)}&roomName=${encodeURIComponent(roomName)}&sup=${encodeURIComponent(currentSeries?currentSeries.name:'')}`;
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
    <button class="btn-dashed" onclick="showAddSubjectModalFor('${roomId}','${seriesId}')">＋ 教科を追加</button>
    <a href="${chatUrl}" style="padding:8px 14px;border:1px dashed var(--border);border-radius:4px;
      color:var(--ink-light);font-size:0.82rem;text-decoration:none;font-family:inherit;">
      💬 チャット →
    </a>
  </div>`;
  html += `</div>`;
  panel.innerHTML = html;
}

// 教科追加モーダルを特定のroomIdに紐付けて開く
window.showAddSubjectModalFor = (roomId, seriesId) => {
  if (!nickname) { showNickModal(); return; }
  currentMosshiRoom = { id: roomId, seriesId: seriesId, name: '' };
  document.getElementById('addSubjectOverlay').style.display = 'flex';
};




// 回・教科追加
window.showAddRoomModal = () => { if(!nickname){showNickModal();return;} document.getElementById('addRoomOverlay').style.display='flex'; };
window.closeAddRoomModal = () => { document.getElementById('addRoomOverlay').style.display='none'; };
window.submitAddRoom = async () => {
  const name=document.getElementById('newRoomName').value.trim();
  if(!name||!currentSeries){alert('名前を入力してください');return;}
  await addDoc(collection(db,'mosshi_series',currentSeries.id,'rooms'),{name,msgCount:0,subjectCount:0,createdAt:serverTimestamp()});
  closeAddRoomModal(); document.getElementById('newRoomName').value='';
  // アコーディオンパネルを再描画
  const sp = document.getElementById('series-panel-'+currentSeries.id);
  if (sp) await loadRoomsIntoPanel(currentSeries.id, sp);
};

window.showAddSubjectModal = () => { if(!nickname){showNickModal();return;} document.getElementById('addSubjectOverlay').style.display='flex'; };
window.closeAddSubjectModal = () => { document.getElementById('addSubjectOverlay').style.display='none'; };
window.submitAddSubject = async () => {
  const name=document.getElementById('newSubjectName').value.trim();
  if(!name||!currentMosshiRoom){alert('教科名を入力してください');return;}
  const snap=await getDocs(collection(db,'mosshi_series',currentMosshiRoom.seriesId,'rooms',currentMosshiRoom.id,'subjects'));
  let exists=false; snap.forEach(d=>{if(d.data().name===name)exists=true;});
  if(exists&&!confirm('既に同じ教科名が存在します。よろしいですか？'))return;
  await addDoc(collection(db,'mosshi_series',currentMosshiRoom.seriesId,'rooms',currentMosshiRoom.id,'subjects'),
    {name,answerCount:0,schema:[],createdAt:serverTimestamp()});
  await updateDoc(doc(db,'mosshi_series',currentMosshiRoom.seriesId,'rooms',currentMosshiRoom.id),{subjectCount:increment(1)});
  closeAddSubjectModal(); document.getElementById('newSubjectName').value='';
  // アコーディオンパネルを再描画
  const rp = document.getElementById('room-panel-'+currentMosshiRoom.id);
  if (rp) await loadSubjectsIntoPanel(currentMosshiRoom.id, currentMosshiRoom.seriesId, rp, currentMosshiRoom.name||'');
};

// =============================================
//  入試機能
// =============================================
async function loadNyushiRooms() {
  const snap=await getDocs(collection(db,'rooms'));
  allRooms=[]; snap.forEach(d=>allRooms.push({id:d.id,...d.data()}));
  renderUnivList('');
}

window.renderUnivList = (searchQuery='') => {
  const q=searchQuery.toLowerCase();
  const univMap={};
  allRooms.forEach(r=>{
    if(q&&!r.univ.toLowerCase().includes(q))return;
    if(!univMap[r.univ])univMap[r.univ]={deptCount:0,totalMsgs:0};
    univMap[r.univ].deptCount++; univMap[r.univ].totalMsgs+=(r.msgCount||0);
  });
  const univs=Object.entries(univMap).sort((a,b)=>b[1].totalMsgs-a[1].totalMsgs);
  document.getElementById('nyushi-univ-count').textContent=univs.length+'大学';
  const grid=document.getElementById('nyushi-univ-grid');
  if(!univs.length){
    grid.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>該当する大学がありません<br>「部屋を作る」から追加できます</p></div>`;
    return;
  }
  grid.innerHTML=univs.map(([univ,info])=>`
    <div class="card" onclick="enterUniv('${esc(univ)}')">
      <div class="card-icon">🏫</div>
      <div class="card-title">${esc(univ)}</div>
      <div class="card-meta"><span>📚 ${info.deptCount}学部</span><span>💬 ${info.totalMsgs}件</span></div>
      <div class="card-arrow">›</div>
    </div>`).join('');
};

window.enterUniv = univ => {
  currentUniv=univ;
  const depts=allRooms.filter(r=>r.univ===univ).sort((a,b)=>(b.msgCount||0)-(a.msgCount||0));
  showNyushiView('nyushi-view-dept');
  setBreadcrumb([{label:'トップ',fn:"resetNyushi()"},{label:univ}]);
  document.getElementById('nyushi-dept-univ-title').textContent=univ;
  document.getElementById('nyushi-dept-count').textContent=depts.length+'学部';
  const grid=document.getElementById('nyushi-dept-grid');
  if(!depts.length){
    grid.innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>学部がまだありません</p></div>`;
    return;
  }
  grid.innerHTML=depts.map(r=>`
    <div class="list-card" onclick="enterNyushiRoom('${r.id}','${esc(r.univ)}','${esc(r.dept)}')">
      <div><div class="list-card-title">${esc(r.dept)}</div><div class="list-card-sub">💬 ${r.msgCount||0}件</div></div>
      <div class="list-card-chevron">›</div>
    </div>`).join('');
};

window.enterNyushiRoom = (roomId,univ,dept) => {
  const url = `room.html?type=nyushi&roomId=${encodeURIComponent(roomId)}&roomName=${encodeURIComponent(dept)}&sup=${encodeURIComponent(univ)}`;
  location.href = url;
};



window.showCreateRoomModal = () => {
  if(!nickname){showNickModal();return;}
  document.getElementById('newUniv').value='';
  document.getElementById('newDept').value='';
  document.getElementById('createRoomOverlay').style.display='flex';
};
window.showCreateRoomModalForCurrentUniv = () => {
  if(!nickname){showNickModal();return;}
  document.getElementById('newUniv').value=currentUniv||'';
  document.getElementById('newDept').value='';
  document.getElementById('createRoomOverlay').style.display='flex';
};
window.closeCreateRoomModal = () => { document.getElementById('createRoomOverlay').style.display='none'; };
window.submitCreateRoom = async () => {
  const univ=document.getElementById('newUniv').value.trim();
  const dept=document.getElementById('newDept').value.trim();
  if(!univ||!dept){alert('大学名と学部名を入力してください');return;}
  const dup=allRooms.find(r=>r.univ===univ&&r.dept===dept);
  if(dup){closeCreateRoomModal();enterNyushiRoom(dup.id,dup.univ,dup.dept);return;}
  const ref=await addDoc(collection(db,'rooms'),{univ,dept,msgCount:0,createdAt:serverTimestamp()});
  closeCreateRoomModal();
  const url = `room.html?type=nyushi&roomId=${encodeURIComponent(ref.id)}&roomName=${encodeURIComponent(dept)}&sup=${encodeURIComponent(univ)}`;
  location.href = url;
};

function resetNyushi() {
  currentNyushiRoomId=null; currentUniv=null;
  showNyushiView('nyushi-view-list');
  setBreadcrumb([]);
  loadNyushiRooms();
}

// チャットページへ遷移
window.openMosshiChat = () => {
  if (!currentMosshiRoom) return;
  const url = `room.html?type=mosshi&seriesId=${encodeURIComponent(currentMosshiRoom.seriesId)}&roomId=${encodeURIComponent(currentMosshiRoom.id)}&roomName=${encodeURIComponent(currentMosshiRoom.name)}&sup=${encodeURIComponent(currentSeries ? currentSeries.name : '')}`;
  location.href = url;
};

// ===== 初期化 =====
renderSeriesList();
loadNyushiRooms();

</script>

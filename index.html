<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>受験板 — 受験生のための掲示板・回答共有</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-inner">
    <div class="logo" onclick="switchTab('mosshi')">
      <span class="logo-main">受<span class="logo-accent">験</span>板</span>
      <span class="logo-sub">JUKEN BOARD</span>
    </div>
    <div class="header-right">
      <div id="headerNick" style="display:none; align-items:center; gap:10px;">
        <span class="nick-display">投稿中：<span class="nick-name" id="nickDisplay"></span></span>
        <button class="btn-change-nick" onclick="showNickModal()">変更</button>
      </div>
    </div>
  </div>
</header>

<!-- ===== TABS ===== -->
<nav class="main-tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" id="tab-mosshi" onclick="switchTab('mosshi')">📝 模試</button>
    <button class="tab-btn" id="tab-nyushi" onclick="switchTab('nyushi')">🏫 入試</button>
  </div>
</nav>

<!-- ===== BREADCRUMB ===== -->
<div class="breadcrumb" id="breadcrumb"></div>

<!-- ===== NICKNAME MODAL ===== -->
<div class="overlay" id="nickOverlay">
  <div class="modal modal-center">
    <div class="modal-icon">✏️</div>
    <h2>ニックネームを入力</h2>
    <p>登録不要。ニックネームだけで<br>すぐに参加できます。</p>
    <input class="input-field" type="text" id="nickInput"
      placeholder="例：東大志望のけんた" maxlength="20"
      onkeydown="if(event.key==='Enter') saveNick()">
    <div style="margin-top:4px">
      <button class="btn-primary" style="width:100%" onclick="saveNick()">参加する →</button>
    </div>
  </div>
</div>

<!-- ===== CREATE ROOM MODAL (入試用) ===== -->
<div class="overlay" id="createRoomOverlay" style="display:none">
  <div class="modal">
    <h2>🏫 新しい部屋を作る</h2>
    <div class="form-group">
      <label class="form-label">大学名</label>
      <input class="input-field" type="text" id="newUniv" placeholder="例：東京大学" maxlength="30">
    </div>
    <div class="form-group">
      <label class="form-label">学部・学科</label>
      <input class="input-field" type="text" id="newDept" placeholder="例：理学部物理学科" maxlength="30">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeCreateRoomModal()">キャンセル</button>
      <button class="btn-primary" onclick="submitCreateRoom()">作成する →</button>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main-container">

  <!-- 模試タブ -->
  <div class="tab-content active" id="content-mosshi">
    <div id="mosshi-content">
      <!-- exam.js が描画 -->
    </div>
  </div>

  <!-- 入試タブ -->
  <div class="tab-content" id="content-nyushi">

    <!-- 大学一覧 -->
    <div class="nyushi-view active" id="nyushi-view-list">
      <div class="hero">
        <div class="hero-eyebrow">入試 掲示板 · 回答共有</div>
        <h1 class="hero-title">大学・学部ごとの<br><span class="accent">仲間</span>と繋がろう</h1>
        <p class="hero-sub">大学を選んで、学部ごとの部屋でチャットや情報交換ができます。</p>
      </div>

      <div class="search-bar">
        <input class="input-field" type="text" id="nyushi-search"
          placeholder="大学名で検索..."
          oninput="Board.renderUnivList(this.value)">
        <button class="btn-secondary" onclick="showCreateRoomModal()">＋ 部屋を作る</button>
      </div>

      <div class="section-label">
        <h2>🏫 大学一覧</h2>
        <div class="line"></div>
        <div class="badge" id="nyushi-univ-count">0大学</div>
      </div>

      <div class="card-grid" id="nyushi-univ-grid">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <!-- 学部一覧 -->
    <div class="nyushi-view" id="nyushi-view-dept">
      <div class="page-header">
        <div class="page-header-title" id="nyushi-dept-univ-title"></div>
        <div class="page-header-sub">学部・学科を選んでください</div>
      </div>

      <div class="section-label">
        <h2>📚 学部・学科一覧</h2>
        <div class="line"></div>
        <div class="badge" id="nyushi-dept-count">0学部</div>
      </div>

      <div class="list-grid" id="nyushi-dept-grid"></div>

      <button class="btn-dashed" onclick="showCreateRoomModalForCurrentUniv()">
        ＋ この大学に学部・学科を追加する
      </button>
    </div>

    <!-- チャット部屋 -->
    <div class="nyushi-view" id="nyushi-view-room">
      <div class="room-header">
        <div class="room-header-info">
          <div class="room-header-sup" id="nyushi-room-univ"></div>
          <div class="room-header-title" id="nyushi-room-dept"></div>
        </div>
        <div class="online-badge">
          <span class="dot-live"></span>
          <span id="nyushi-msg-count">0</span> 件の投稿
        </div>
      </div>

      <div class="chat-layout">
        <div class="messages-area" id="nyushi-messages">
          <div class="loading">読み込み中...</div>
        </div>
        <div class="chat-input-bar">
          <textarea class="chat-textarea" id="nyushi-chat-input"
            placeholder="メッセージを入力... (Shift+Enterで送信)" rows="1"
            onkeydown="if(event.key==='Enter'&&event.shiftKey){event.preventDefault();Board.sendMessage();}"
            oninput="onAutoResize(this)"></textarea>
          <button class="btn-send" id="nyushi-send-btn" onclick="Board.sendMessage()">送信</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- ===== SCRIPTS ===== -->
<script type="module">
  import { NickManager, autoResize } from './js/firebase.js';
  import * as BoardModule from './js/board.js';
  import * as ExamModule  from './js/exam.js';

  window.Board = BoardModule;
  window.Exam  = ExamModule;
  window.onAutoResize = autoResize;

  // ニックネーム
  function applyNick(nick) {
    document.getElementById('headerNick').style.display = 'flex';
    document.getElementById('nickDisplay').textContent  = nick;
    BoardModule.setNickname(nick);
    ExamModule.setNickname(nick);
  }

  window.showNickModal = () => {
    document.getElementById('nickOverlay').style.display = 'flex';
  };

  window.saveNick = () => {
    const val = document.getElementById('nickInput').value.trim();
    if (!val) { alert('ニックネームを入力してください'); return; }
    NickManager.set(val);
    document.getElementById('nickOverlay').style.display = 'none';
    applyNick(val);
  };

  const saved = NickManager.get();
  if (saved) {
    document.getElementById('nickInput').value = saved;
    document.getElementById('nickOverlay').style.display = 'none';
    applyNick(saved);
  }

  // タブ切り替え
  window.switchTab = (tab) => {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('content-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('breadcrumb').innerHTML = '';
    if (tab === 'nyushi') BoardModule.resetToTop();
  };

  // 部屋作成モーダル
  window.showCreateRoomModal = () => {
    if (!NickManager.get()) { showNickModal(); return; }
    document.getElementById('newUniv').value = '';
    document.getElementById('newDept').value = '';
    document.getElementById('createRoomOverlay').style.display = 'flex';
  };

  window.showCreateRoomModalForCurrentUniv = () => {
    if (!NickManager.get()) { showNickModal(); return; }
    const univ = document.getElementById('nyushi-dept-univ-title').textContent;
    document.getElementById('newUniv').value = univ;
    document.getElementById('newDept').value = '';
    document.getElementById('createRoomOverlay').style.display = 'flex';
  };

  window.closeCreateRoomModal = () => {
    document.getElementById('createRoomOverlay').style.display = 'none';
  };

  window.submitCreateRoom = async () => {
    const univ = document.getElementById('newUniv').value.trim();
    const dept = document.getElementById('newDept').value.trim();
    if (!univ || !dept) { alert('大学名と学部名を入力してください'); return; }
    closeCreateRoomModal();
    await BoardModule.createRoom(univ, dept);
  };

  // 初期化
  BoardModule.initBoard();
  ExamModule.initExam();
</script>

</body>
</html>
